{% extends "games/base.html" %}

{% block content %}
    <h2>Iniciar Sessió</h2>

    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        
        <table>
            <tr>
                <td>{{ form.username.label_tag }}</td>
                <td>{{ form.username }}</td>
            </tr>
            <tr>
                <td>{{ form.password.label_tag }}</td>
                <td>{{ form.password }}</td>
            </tr>
        </table>

        <input type="submit" value="Entrar" style="margin-top: 10px; padding: 10px 20px;">
        <input type="hidden" name="next" value="{{ next }}">
    </form>

    <p style="margin-top: 20px;">
        No tens compte? <a href="{% url 'registre' %}">Registra't aquí</a>
    </p>
{% endblock %}
